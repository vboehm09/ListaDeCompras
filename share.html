<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Compras</title>

  <!-- Firebase SDKs -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA9ci3DVb7pjjBgc_mPFV4SPZsWJ8yheMc",
      authDomain: "listai-210cf.firebaseapp.com",
      projectId: "listai-210cf",
      storageBucket: "listai-210cf.firebasestorage.app",
      messagingSenderId: "339099543831",
      appId: "1:339099543831:web:7971d1f391e952c0786f52"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function carregarLista() {
      // Pega o ID da URL: /share/XXXXXXX
      const partes = window.location.pathname.split('/');
      const listId = partes[partes.length - 1];

      if (!listId || listId === 'share') {
        mostrarErro('Link inválido. Peça um novo link para quem compartilhou.');
        return;
      }

      try {
        const docRef = doc(db, "listas", listId);
        const docSnap = await getDoc(docRef);

        if (!docSnap.exists()) {
          mostrarErro('Lista não encontrada. Ela pode ter sido removida.');
          return;
        }

        const dados = docSnap.data();
        renderizarLista(dados);
      } catch (e) {
        console.error(e);
        mostrarErro('Erro ao carregar a lista. Tente novamente.');
      }
    }

    function renderizarLista(dados) {
      const itens = dados.itens || [];
      const criadoEm = dados.criadoEm ? new Date(dados.criadoEm) : null;

      // Atualiza data
      if (criadoEm) {
        document.getElementById('data-criacao').textContent =
          criadoEm.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
      }

      // Contadores
      const total = itens.length;
      document.getElementById('total-itens').textContent = total;
      atualizarContador(itens);

      // Agrupa por categoria
      const grupos = {};
      itens.forEach(item => {
        const cat = item.category || 'Outros';
        if (!grupos[cat]) grupos[cat] = [];
        grupos[cat].push(item);
      });

      const container = document.getElementById('lista-container');
      container.innerHTML = '';

      // Estado local de checkboxes (não altera o Firebase)
      const estado = {};
      itens.forEach(item => { estado[item.name] = item.gotIt || false; });

      Object.keys(grupos).sort().forEach(categoria => {
        const section = document.createElement('div');
        section.className = 'categoria';

        const header = document.createElement('div');
        header.className = 'categoria-header';
        header.innerHTML = `<span class="categoria-nome">${categoria}</span><div class="categoria-linha"></div>`;
        section.appendChild(header);

        grupos[categoria].forEach(item => {
          const el = document.createElement('div');
          el.className = 'item' + (estado[item.name] ? ' pego' : '');
          el.dataset.nome = item.name;

          el.innerHTML = `
            <div class="item-check ${estado[item.name] ? 'checked' : ''}" data-nome="${item.name}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            ${item.image ? `<img class="item-img" src="${item.image}" alt="${item.name}" onerror="this.style.display='none'">` : '<div class="item-img-placeholder"></div>'}
            <span class="item-nome">${item.name}</span>
          `;

          el.addEventListener('click', () => {
            estado[item.name] = !estado[item.name];
            el.classList.toggle('pego', estado[item.name]);
            el.querySelector('.item-check').classList.toggle('checked', estado[item.name]);
            atualizarContador(
              Object.keys(estado).map(n => ({ name: n, gotIt: estado[n] }))
            );
          });

          section.appendChild(el);
        });

        container.appendChild(section);
      });

      // Esconde loading
      document.getElementById('loading').style.display = 'none';
      document.getElementById('conteudo').style.display = 'block';
    }

    function atualizarContador(itens) {
      const pegosCount = itens.filter(i => i.gotIt).length;
      const total = itens.length;
      // recalcula com estado atual
      const estadoAtual = document.querySelectorAll('.item-check.checked').length;
      document.getElementById('pegos-count').textContent = estadoAtual;
      const pct = total > 0 ? (estadoAtual / total) * 100 : 0;
      document.getElementById('progresso-fill').style.width = pct + '%';
    }

    function mostrarErro(msg) {
      document.getElementById('loading').style.display = 'none';
      const err = document.getElementById('erro');
      err.style.display = 'flex';
      err.querySelector('p').textContent = msg;
    }

    // Atualiza contador ao clicar
    document.addEventListener('click', e => {
      if (e.target.closest('.item-check')) {
        setTimeout(() => {
          const total = parseInt(document.getElementById('total-itens').textContent);
          const pegos = document.querySelectorAll('.item-check.checked').length;
          document.getElementById('pegos-count').textContent = pegos;
          const pct = total > 0 ? (pegos / total) * 100 : 0;
          document.getElementById('progresso-fill').style.width = pct + '%';
        }, 10);
      }
    });

    carregarLista();
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --verde: #1B5E20;
      --verde-medio: #2E7D32;
      --verde-claro: #A5D6A7;
      --verde-fundo: #E8F5E9;
      --cinza-fundo: #F7F9F7;
      --branco: #ffffff;
      --texto: #212121;
      --texto-suave: #757575;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cinza-fundo);
      min-height: 100vh;
      color: var(--texto);
    }

    /* HEADER */
    .header {
      background: var(--verde);
      padding: 20px 20px 28px;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 0; right: 0;
      height: 40px;
      background: var(--cinza-fundo);
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }
    .header-inner {
      max-width: 480px;
      margin: 0 auto;
    }
    .header-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .header-tag svg { width: 12px; height: 12px; }
    .header h1 {
      color: #fff;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
    }
    .header-data {
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      margin-top: 4px;
    }

    /* PROGRESSO */
    .progresso-card {
      max-width: 480px;
      margin: 28px auto 0;
      padding: 0 16px;
    }
    .progresso-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .progresso-texto {
      font-size: 14px;
      color: var(--texto-suave);
      font-weight: 600;
    }
    .progresso-nums {
      font-size: 14px;
      font-weight: 800;
      color: var(--verde-medio);
    }
    .progresso-bar {
      height: 8px;
      background: #ddd;
      border-radius: 99px;
      overflow: hidden;
    }
    .progresso-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--verde-medio), #66BB6A);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* AVISO SOMENTE LEITURA */
    .aviso {
      max-width: 480px;
      margin: 14px auto 0;
      padding: 0 16px;
    }
    .aviso-inner {
      background: #FFF8E1;
      border-left: 4px solid #FFB300;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #5D4037;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .aviso-inner svg { flex-shrink: 0; width: 16px; height: 16px; color: #FFB300; }

    /* LISTA */
    .lista-wrapper {
      max-width: 480px;
      margin: 16px auto 40px;
      padding: 0 16px;
    }

    .categoria { margin-bottom: 8px; }

    .categoria-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 0 8px;
    }
    .categoria-nome {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--verde-medio);
      white-space: nowrap;
    }
    .categoria-linha {
      flex: 1;
      height: 1px;
      background: var(--verde-claro);
      opacity: 0.5;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--branco);
      padding: 10px 12px;
      border-radius: 14px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s, transform 0.15s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .item:active { transform: scale(0.98); }
    .item.pego {
      background: var(--verde-fundo);
      opacity: 0.72;
    }

    .item-check {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      border: 2px solid #BDBDBD;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
      color: transparent;
    }
    .item-check svg { width: 14px; height: 14px; }
    .item-check.checked {
      background: var(--verde-medio);
      border-color: var(--verde-medio);
      color: #fff;
    }

    .item-img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      object-fit: cover;
      background: #f0f4f1;
      flex-shrink: 0;
    }
    .item-img-placeholder {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #f0f4f1;
      flex-shrink: 0;
    }

    .item-nome {
      font-size: 16px;
      font-weight: 600;
      color: var(--texto);
      flex: 1;
      transition: color 0.2s, text-decoration 0.2s;
    }
    .item.pego .item-nome {
      text-decoration: line-through;
      color: var(--texto-suave);
    }

    /* LOADING */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--verde-claro);
      border-top-color: var(--verde-medio);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { color: var(--texto-suave); font-size: 15px; font-weight: 600; }

    /* ERRO */
    #erro {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
      padding: 32px;
      text-align: center;
    }
    #erro svg { width: 56px; height: 56px; color: #BDBDBD; }
    #erro h2 { font-size: 18px; font-weight: 800; color: var(--texto); }
    #erro p { font-size: 14px; color: var(--texto-suave); }

    #conteudo { display: none; }
  </style>
</head>
<body>

  <!-- LOADING -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Carregando lista...</p>
  </div>

  <!-- ERRO -->
  <div id="erro">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
    <h2>Ops!</h2>
    <p>Mensagem de erro aqui</p>
  </div>

  <!-- CONTEÚDO -->
  <div id="conteudo">
    <div class="header">
      <div class="header-inner">
        <div class="header-tag">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          Lista compartilhada
        </div>
        <h1>🛒 Lista de Compras</h1>
        <div class="header-data" id="data-criacao"></div>
      </div>
    </div>

    <div class="progresso-card">
      <div class="progresso-info">
        <span class="progresso-texto">Itens pegos</span>
        <span class="progresso-nums"><span id="pegos-count">0</span> / <span id="total-itens">0</span></span>
      </div>
      <div class="progresso-bar">
        <div class="progresso-fill" id="progresso-fill"></div>
      </div>
    </div>

    <div class="aviso">
      <div class="aviso-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Toque nos itens para marcar como pego. Isso não altera a lista original.
      </div>
    </div>

    <div class="lista-wrapper" id="lista-container"></div>
  </div>

</body>
</html>
